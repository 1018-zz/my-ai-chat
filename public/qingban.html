<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>清伴 · 温柔对话 PWA</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#83a7c2" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        main: {
          brown: '#A8907C',
          blue: '#83A7C2',
          green: '#87B8A9',
          bg: '#F6F8FA',
          text: '#454A52',
          light: '#8A94A0',
          border: 'rgba(168,144,124,0.25)'
        }
      },
      fontFamily: {
        sans: ['system-ui', 'PingFang SC', 'Microsoft YaHei', 'sans-serif']
      }
    }
  }
}
</script>

<style type="text/tailwindcss">
@layer utilities {
  .glass {
    background: rgba(255,255,255,0.48);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid main-border;
  }
  .glass-deep {
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .bubble-left {
    background: rgba(255,255,255,0.42);
    border-radius: 20px 20px 20px 6px;
  }
  .bubble-right {
    background: rgba(131,167,194,0.28);
    border-radius: 20px 20px 6px 20px;
  }
  .scroll-slim::-webkit-scrollbar {
    width: 4px;
  }
  .scroll-slim::-webkit-scrollbar-thumb {
    background: rgba(138,148,160,0.3);
    border-radius: 3px;
  }
}
</style>
</head>

<body class="bg-main-bg text-main-text h-screen overflow-hidden relative">

<!-- 侧边工具栏容器 -->
<div id="sidebarWrapper" style="position:fixed; left:0; top:50%; transform:translateY(-50%); z-index:30; pointer-events:none;">
  <!-- 侧边栏面板 -->
  <div id="sidebarPanel" style="position:absolute; left:-80px; top:-120px; width:60px; background:rgba(255,255,255,0.62); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-radius:0 16px 16px 0; padding:16px 8px; display:flex; flex-direction:column; align-items:center; gap:20px; transition:left 0.38s cubic-bezier(0.4,0,0.2,1); pointer-events:auto; border:1px solid rgba(168,144,124,0.25); border-left:none;">
    <button onclick="alert('用户信息')" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.48);display:flex;align-items:center;justify-content:center;color:#8A94A0;cursor:pointer;"><i class="fa fa-user-o"></i></button>
    <button onclick="alert('收藏')" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.48);display:flex;align-items:center;justify-content:center;color:#8A94A0;cursor:pointer;"><i class="fa fa-heart-o"></i></button>
    <button onclick="alert('音乐')" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.48);display:flex;align-items:center;justify-content:center;color:#8A94A0;cursor:pointer;"><i class="fa fa-music"></i></button>
    <button onclick="alert('主题')" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.48);display:flex;align-items:center;justify-content:center;color:#8A94A0;cursor:pointer;"><i class="fa fa-moon-o"></i></button>
    <button onclick="alert('设置')" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.48);display:flex;align-items:center;justify-content:center;color:#8A94A0;cursor:pointer;"><i class="fa fa-cog"></i></button>
  </div>
  
  <!-- 展开按钮：独立定位，始终在屏幕上 -->
  <button id="sideToggle" style="position:absolute; left:0; top:-20px; width:28px; height:44px; border-radius:0 14px 14px 0; background:rgba(255,255,255,0.62); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(168,144,124,0.25); border-left:none; display:flex; align-items:center; justify-content:center; color:#83A7C2; font-size:14px; cursor:pointer; transition:left 0.38s cubic-bezier(0.4,0,0.2,1); pointer-events:auto; padding:0;">
    <i class="fa fa-chevron-right"></i>
  </button>
</div>

<!-- 顶部头部 -->
<header class="glass-deep max-w-3xl mx-auto mt-5 rounded-xl px-5 py-4 flex items-center justify-between z-20 relative">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-full glass flex items-center justify-center text-main-green">
      <i class="fa fa-heart-o"></i>
    </div>
    <div>
      <h2 class="font-medium text-sm">清伴</h2>
      <p class="text-xs text-main-light">安静陪伴 · 轻声对话</p>
    </div>
  </div>
  <div class="text-main-light cursor-pointer hover:text-main-blue">
    <i class="fa fa-ellipsis-h"></i>
  </div>
</header>

<!-- 聊天消息区域 -->
<main class="max-w-3xl mx-auto px-4 py-6 h-[calc(100vh-190px)] overflow-y-auto scroll-slim space-y-5">
  <div class="flex items-start gap-3">
    <div class="w-9 h-9 rounded-full glass flex-shrink-0 flex items-center justify-center text-main-green">
      <i class="fa fa-user-o"></i>
    </div>
    <div class="bubble-left glass px-4 py-3 max-w-[72%]">
      <p class="text-sm leading-relaxed">不必勉强热闹，清冷本身也是一种松弛。慢慢说，或是静静待着都可以。</p>
    </div>
  </div>
  <div class="flex items-start gap-3 justify-end">
    <div class="bubble-right glass px-4 py-3 max-w-[72%]">
      <p class="text-sm leading-relaxed">更喜欢这种淡淡的、克制的氛围，温柔又有距离感。</p>
    </div>
    <div class="w-9 h-9 rounded-full glass flex-shrink-0 flex items-center justify-center text-main-brown">
      <i class="fa fa-user"></i>
    </div>
  </div>
  <div class="flex items-start gap-3">
    <div class="w-9 h-9 rounded-full glass flex-shrink-0 flex items-center justify-center text-main-green">
      <i class="fa fa-user-o"></i>
    </div>
    <div class="bubble-left glass px-4 py-3 max-w-[72%]">
      <p class="text-sm leading-relaxed">保持恰到好处的温柔距离，不浓烈、不疏离，安安静静地陪着你🌫️</p>
    </div>
  </div>
  <div class="h-8"></div>
</main>

<!-- 底部输入框 -->
<footer class="max-w-3xl mx-auto px-4 pb-6">
  <div class="glass-deep rounded-2xl px-4 py-4 flex items-end gap-3">
    <button class="text-main-light hover:text-main-green text-lg"><i class="fa fa-smile-o"></i></button>
    <textarea id="msgInput" class="flex-1 bg-transparent outline-none resize-none min-h-[46px] max-h-[130px] text-sm leading-relaxed placeholder:text-main-light" rows="1" placeholder="想说些什么……"></textarea>
    <button id="sendBtn" class="w-10 h-10 rounded-full glass flex items-center justify-center text-main-blue hover:text-white hover:bg-main-blue/25 transition"><i class="fa fa-paper-plane-o"></i></button>
  </div>
</footer>

<script>
// 侧边栏逻辑
(function(){
  const panel = document.getElementById('sidebarPanel');
  const toggleBtn = document.getElementById('sideToggle');
  let sideOpen = false;

  toggleBtn.addEventListener('click', function(e){
    e.stopPropagation();
    sideOpen = !sideOpen;
    if(sideOpen){
      panel.style.left = '0px';
      toggleBtn.style.left = '60px';
      toggleBtn.innerHTML = '<i class="fa fa-chevron-left"></i>';
    }else{
      panel.style.left = '-80px';
      toggleBtn.style.left = '0px';
      toggleBtn.innerHTML = '<i class="fa fa-chevron-right"></i>';
    }
  });
})();

// 输入框自适应高度
const input = document.getElementById('msgInput');
input.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight,130) + 'px';
});

// Enter发送
input.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    document.getElementById('sendBtn').click();
  }
});

// PWA注册
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
